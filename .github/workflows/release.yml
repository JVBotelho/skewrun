name: Release

on:
  push:
    tags:
      - 'v*.*.*'



jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Install Rust
      uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
      with:
        toolchain: stable
        targets: ${{ matrix.target }}

    - name: Install Zig
      uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1

    - name: Install cargo-zigbuild
      uses: taiki-e/install-action@c80aa426f9496ec5c2c1de850f2d713d34aed6eb # cargo-zigbuild

    - name: Build with cargo-zigbuild
      run: cargo zigbuild --release --target ${{ matrix.target }} --package skewrun

    - name: Upload artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: skewrun-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/skewrun

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Download artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: artifacts

    - name: Prepare assets
      run: |
        mkdir -p release_assets
        mv artifacts/skewrun-x86_64-unknown-linux-musl/skewrun release_assets/skewrun-x86_64-linux-musl
        mv artifacts/skewrun-aarch64-unknown-linux-musl/skewrun release_assets/skewrun-aarch64-linux-musl

    - name: Generate artifact attestation
      uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
      with:
        subject-path: |
          release_assets/skewrun-x86_64-linux-musl
          release_assets/skewrun-aarch64-linux-musl

    - name: Release
      uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
      with:
        files: release_assets/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
