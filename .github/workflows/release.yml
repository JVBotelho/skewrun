name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install Zig
      uses: mlugg/setup-zig@v2

    - name: Install cargo-zigbuild
      uses: taiki-e/install-action@cargo-zigbuild

    - name: Build with cargo-zigbuild
      run: cargo zigbuild --release --target ${{ matrix.target }} --package skewrun

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: skewrun-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/skewrun

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare assets
      run: |
        mkdir -p release_assets
        mv artifacts/skewrun-x86_64-unknown-linux-musl/skewrun release_assets/skewrun-x86_64-linux-musl
        mv artifacts/skewrun-aarch64-unknown-linux-musl/skewrun release_assets/skewrun-aarch64-linux-musl

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: release_assets/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
