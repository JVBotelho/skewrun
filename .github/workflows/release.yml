name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: skewrun-x86_64-linux
            cross_tools: musl-tools
            linker: ""
          - target: aarch64-unknown-linux-musl
            artifact: skewrun-aarch64-linux
            cross_tools: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross tools
        run: sudo apt-get install -y ${{ matrix.cross_tools }}

      - name: Configure linker (aarch64)
        if: matrix.linker != ''
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<EOF
          [target.${{ matrix.target }}]
          linker = "${{ matrix.linker }}"
          EOF

      - name: Build release
        run: |
          cargo build --locked --release --target ${{ matrix.target }}
          strip target/${{ matrix.target }}/release/skewrun || true

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/skewrun ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            skewrun-x86_64-linux
            skewrun-aarch64-linux
          generate_release_notes: true
