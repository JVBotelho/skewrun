[graph]
targets = []

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
skip = [
    # getrandom 0.4 pulled by tempfile → proptest (dev-dependency only, never in release binary)
    { name = "getrandom", version = "0.4" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
